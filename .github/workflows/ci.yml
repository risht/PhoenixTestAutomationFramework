name: Phoenix Test Automation Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

    # 🛑 FIX: ADD THIS PERMISSIONS BLOCK 🛑
permissions:
  contents: read # Default for checkout action
  security-events: write # <-- THIS GRANTS PERMISSION FOR DEPENDENCY SUBMISSION

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Executing Test Automation Framework
      run: mvn clean test -DsuiteXmlFile=testng.xml -Denv=qa

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v5.0.0
      with:
        name: Surefire report
        path: target/surefireports/
        retention-days: 10
        
      

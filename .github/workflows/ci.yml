name: Phoenix Test Automation Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: 
    inputs:
      env:
        description: "Environment"
        type: choice
        options: [qa, uat, dev]
        default: qa
        required: true
      suiteXmlFile:
         description: "TestNG Xml File"
         type: choice
         options: [testng.xml, smoke.xml, regression.xml]
         default: testng.xml
         required: true
    
        

    # 🛑 FIX: ADD THIS PERMISSIONS BLOCK 🛑
permissions:
  contents: read # Default for checkout action
  security-events: write # <-- THIS GRANTS PERMISSION FOR DEPENDENCY SUBMISSION

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Executing Test Automation Framework
      run: mvn clean test -DsuiteXmlFile="${{ github.event.inputs.suiteXmlFile}}" -Denv="${{ github.event.inputs.env}}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v5.0.0
      with:
        name: Surefire report
        path: target/surefire-reports/
        retention-days: 10
        
      
